<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>

    <link rel="stylesheet" href="stylesheet/style.css">
    <link rel="stylesheet" href="stylesheet/header.css">
    <link rel="stylesheet" href="stylesheet/productlist.css">

    <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Gudea:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="icon" type="image/png" sizes="32x32" href="vf-favicon.webp">

    <script src="productlist.js" defer></script>
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="logo.webp" alt="Logo">
            </a>
        </div>
        <nav>
            <ul class="menu">
                <li><a href="index.html">←</a></li>
                <li><a href="">❤️</a></li>
                <li><a href="">🛒</a></li>
            </ul>
            <button class="burger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </button>
        </nav>
    </header>
    <main>
        <div class="main-box">
            <div class="button-box">
                <button id="sortByPriceBtn" class="sortBtn2">Sort from cheapest</button>
            </div>
            <div class="button-box">
                <button id="sortByWomen" class="sortBtn">Filter: Women's</button>
                <!-- <button id="sortByBags" class="sortBtn">Filter: Backpacks</button>
                <button id="sortByHats" class="sortBtn">Filter: Water Bottles</button> -->
                <button id="sortByDiscount" class="sortBtn">Filter: Discount</button>
            </div>
            <div class="button-box">
                <button id="sortByStock" class="sortBtn">Filter: In stock</button>
                <button id="sortByAll" class="sortBtn">Reset filters</button>
            </div>
            <div class="productbox-wrapper">


            </div>
        </div>
    </main>
    <script src="menu.js"></script>
</body>

</html>
